<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprendemos Juntos — Audio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1A3A5C 0%,#2A6A8F 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{font-size:14px;color:#888;margin-bottom:8px;letter-spacing:1px}
.oracion{font-size:26px;font-weight:800;color:#1A3A5C;line-height:1.3;margin:24px 0 32px;min-height:70px;display:flex;align-items:center;justify-content:center}
.btn{background:#1E7A5E;color:#fff;border:none;border-radius:50px;padding:18px 40px;font-size:18px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px}
.btn.playing{background:#B5451B}
.footer{font-size:11px;color:#bbb;margin-top:24px}
</style>
</head>
<body>
<div class="card">
<div class="logo">📚 APRENDEMOS JUNTOS</div>
<div class="oracion" id="o">Cargando...</div>
<button class="btn" id="b" onclick="h()"><span>🔊</span> <span>Escuchar</span></button>
<div class="footer">Libro de Pictogramas TEA · © 2026</div>
</div>
<script>
var t=new URLSearchParams(location.search).get('t')||'Aprendemos juntos';
t=decodeURIComponent(t);
document.getElementById('o').textContent=t;
var sp=false;
function h(){
if(!window.speechSynthesis)return;
if(sp){speechSynthesis.cancel();sp=false;document.getElementById('b').classList.remove('playing');return}
speechSynthesis.cancel();
var u=new SpeechSynthesisUtterance(t);
u.lang='es-419';u.rate=0.85;u.pitch=1.1;
var v=speechSynthesis.getVoices().find(x=>x.lang.startsWith('es'));
if(v)u.voice=v;
u.onstart=function(){sp=true;document.getElementById('b').classList.add('playing')};
u.onend=function(){sp=false;document.getElementById('b').classList.remove('playing')};
speechSynthesis.speak(u);
}
window.addEventListener('load',function(){setTimeout(h,600)});
</script>
</body>
</html>
